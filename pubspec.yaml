name: photopedia
description: A photobooth app with camera, editing, gallery, and email features.
publish_to: 'none'
version: 1.0.0+1

environment:
  # Kompatibel dari Flutter 3.x (Dart 3.0) sampai Flutter 4.x (Dart 4.0)
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Kamera & gambar
  camera: '>=0.10.0 <0.11.0'
  image_picker: '>=1.0.0 <2.0.0'
  image: '>=4.0.0 <5.0.0'

  # File & storage
  path_provider: '>=2.0.0 <3.0.0'
  path: '>=1.8.0 <2.0.0'
  shared_preferences: '>=2.0.0 <3.0.0'

  # UI
  photo_view: '>=0.14.0 <1.0.0'
  flutter_colorpicker: '>=1.0.0 <2.0.0'
  flutter_staggered_grid_view: '>=0.7.0 <1.0.0'
  dotted_border: '>=2.0.0 <3.0.0'

  # Email via SMTP
  mailer: '>=6.1.0 <7.0.0'

  # Utilitas
  intl: '>=0.18.0 <1.0.0'
  permission_handler: '>=11.0.0 <12.0.0'

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: '>=3.0.0 <5.0.0'
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/frames/Frame_1.png
    - assets/frames/Frame_2.png
    - assets/frames/Frame_3.png

flutter_icons:
  android: 'launcher_icon'
  ios: true
  image_path: 'assets/logo/app_icon.png'