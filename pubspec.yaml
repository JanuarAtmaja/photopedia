name: photopedia
description: A photobooth app with camera, editing, gallery, and email features.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.10.5+9
  image_picker: ^1.1.2
  path_provider: ^2.1.3
  path: ^1.9.0
  image: ^4.1.7
  photo_view: ^0.15.0
  flutter_colorpicker: ^1.1.0
  mailer: ^6.1.2
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.1
  flutter_staggered_grid_view: ^0.7.0
  intl: ^0.19.0
  dotted_border: ^2.1.0
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
